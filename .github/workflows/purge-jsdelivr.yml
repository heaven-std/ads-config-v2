name: Purge jsDelivr Cache

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'

jobs:
  purge:
    runs-on: ubuntu-latest

    steps:
      - name: Purge jsDelivr cache (file + repo + branch)
        run: |
          URLS=(
            "https://purge.jsdelivr.net/gh/heaven-std/ads-config-v2/package.json"
            "https://purge.jsdelivr.net/gh/heaven-std/ads-config-v2"
            "https://purge.jsdelivr.net/gh/heaven-std/ads-config-v2@main/package.json"
          )

          for url in "${URLS[@]}"
          do
            echo "=============================="
            echo "Purging: $url"

            for i in {1..3}
            do
              echo "Attempt $i..."

              response=$(curl -s -w "\nHTTP_STATUS:%{http_code}" --max-time 10 "$url")

              body=$(echo "$response" | sed -e 's/HTTP_STATUS\:.*//g')
              status=$(echo "$response" | tr -d '\n' | sed -e 's/.*HTTP_STATUS://')

              echo "Status: $status"
              echo "Response: $body"

              if [ "$status" = "200" ]; then
                echo "✅ Purge success"
                break
              fi

              echo "Retrying..."
              sleep 2
            done
          done
